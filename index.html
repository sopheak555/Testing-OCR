<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Scanner (Debug)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ... (previous styles) ... */
        #debug {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Receipt Scanner (Debug)</h1>
    <button id="scanButton">Scan Receipt</button>
    <div id="result"></div>
    <div id="debug"></div>

    <script>
        let tg = window.Telegram.WebApp;
tg.expand();

function log(message) {
    console.log(message);
    document.getElementById('debug').textContent += message + '\n';
}

document.getElementById('scanButton').addEventListener('click', () => {
    log('Scan button clicked');
    selectImage();
});

function selectImage() {
    log('Selecting image');
    tg.showPopup({
        title: 'Select Image',
        message: 'Choose an image to scan',
        buttons: [
            {id: 'camera', type: 'default', text: 'Take Photo'},
            {id: 'gallery', type: 'default', text: 'Choose from Gallery'}
        ]
    }, (buttonId) => {
        log(`Button clicked: ${buttonId}`);
        const useCamera = buttonId === 'camera';
        const mediaOptions = useCamera ? { type: 'photo', removeAfterSend: true } : { types: ['photo'], removeAfterSend: true };
        tg.openMedia(mediaOptions, (media) => {
            if (media && media.length > 0) {
                log('Media selected, uploading...');
                uploadImage(media[0]);
            } else {
                log('No media selected');
                tg.showAlert('No image selected.');
            }
        });
    });
}

function uploadImage(file) {
    log(`Uploading file: ${file.name}, size: ${file.size} bytes`);
    
    tg.showPopup({
        title: 'Processing',
        message: 'Please wait while we process your image...',
        buttons: [
            {type: 'close', text: 'Cancel'}
        ]
    });

    const formData = new FormData();
    formData.append('image', file);
    formData.append('chat_id', tg.initDataUnsafe.user.id);

    fetch('https://127.0.0.1:5000/scan_receipt', {
        method: 'POST',
        body: formData
    })
    .then(response => {
        log(`Server response status: ${response.status}`);
        if (!response.ok) {
            return response.text().then(text => {
                throw new Error(`Network response was not ok: ${response.status} ${response.statusText}\n${text}`);
            });
        }
        return response.json();
    })
    .then(data => {
        log('Data received from server');
        tg.closePopup();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        tg.showAlert('Receipt data has been processed.');
    })
    .catch(error => {
        log(`Error: ${error.message}`);
        tg.closePopup();
        tg.showAlert('Error processing image: ' + error.message);
    });
}

tg.ready();
    </script>
</body>
</html>
